name: Deploy to Main Org on merge to main (delta)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Delta Deploy to Main Org
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SF_ORG_ALIAS: mainOrg
      # Change these if your source directory differs
      SOURCE_DIR: force-app
      # File to persist the last successful deployed commit SHA
      LAST_SUCCESS_FILE: .github/_last_success_main_sha.txt

    steps:
      - name: Checkout repository (full history for delta)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Verify sf version
        run: sf --version

      - name: Authenticate to Main Org (via SFDX_AUTH_URL_MAIN)
        env:
          SFDX_AUTH_URL_MAIN: ${{ secrets.SFDX_AUTH_URL_MAIN }}
        run: |
          if [ -z "$SFDX_AUTH_URL_MAIN" ]; then
            echo "SFDX_AUTH_URL_MAIN secret is not set. Please add it in GitHub repo settings."
            exit 1
          fi
          echo "$SFDX_AUTH_URL_MAIN" | sf org login sfdx-url --alias "$SF_ORG_ALIAS" --sfdx-url-stdin
          sf org display --target-org "$SF_ORG_ALIAS"

      - name: Determine delta range
        id: delta
        shell: bash
        run: |
          # Determine the previous successful main deploy commit from GitHub Releases/Tags/Artifacts is more robust,
          # but for simplicity we will compute delta from the previous commit on main.
          # If workflow needs resilience across force-pushes, integrate with a persisted artifact or environment.
          set -euo pipefail

          # Default range: previous commit to current
          PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          CURR_SHA=$(git rev-parse HEAD)

          if [ -z "$PREV_SHA" ]; then
            echo "First commit on main or shallow history; performing full deploy of ${SOURCE_DIR}."
            echo "range=" >> $GITHUB_OUTPUT
            echo "full_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "Computing delta between $PREV_SHA...$CURR_SHA"
            echo "range=$PREV_SHA...$CURR_SHA" >> $GITHUB_OUTPUT
            echo "full_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Build delta package directory
        id: build_delta
        if: steps.delta.outputs.full_deploy == &#39;false&#39;
        shell: bash
        run: |
          set -euo pipefail
          RANGE="${{ steps.delta.outputs.range }}"

          # Gather changed files limited to the source directory
          CHANGED=$(git diff --name-only --diff-filter=ACMRTUXB $RANGE -- "${SOURCE_DIR}/**" | tr -d &#39;\r&#39;)
          if [ -z "$CHANGED" ]; then
            echo "No changes detected in ${SOURCE_DIR}. Skipping deployment."
            echo "no_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Create delta directory and copy changed files preserving structure
          DELTA_DIR="delta"
          mkdir -p "$DELTA_DIR"

          # Copy each changed path and its -meta.xml if applicable
          while IFS= read -r FILE; do
            if [ -z "$FILE" ]; then
              continue
            fi
            # Ensure destination folder exists
            DEST_DIR="$DELTA_DIR/$(dirname "$FILE")"
            mkdir -p "$DEST_DIR"

            # Copy the file if it still exists (deleted files are handled via destructive changes which this simple delta does not generate)
            if [ -f "$FILE" ]; then
              cp "$FILE" "$DEST_DIR/"
              # If a paired -meta.xml exists, copy it too
              if [ -f "$FILE-meta.xml" ]; then
                cp "$FILE-meta.xml" "$DEST_DIR/"
              fi
            fi
          done <<EOF
          $CHANGED
          EOF

          echo "Delta directory built at: $DELTA_DIR"
          echo "delta_dir=$DELTA_DIR" >> $GITHUB_OUTPUT
          echo "no_changes=false" >> $GITHUB_OUTPUT

      - name: Decide deployment path
        id: deploy_path
        shell: bash
        run: |
          if [ "${{ steps.delta.outputs.full_deploy }}" = "true" ]; then
            echo "path=${SOURCE_DIR}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            if [ "${{ steps.build_delta.outputs.no_changes }}" = "true" ]; then
              echo "No delta changes to deploy."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "path=${{ steps.build_delta.outputs.delta_dir }}" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Display chosen deployment folder
        if: steps.deploy_path.outputs.skip == &#39;false&#39;
        run: |
          echo "Deploy path: ${{ steps.deploy_path.outputs.path }}"
          echo "Tree:"
          sudo apt-get update && sudo apt-get install -y tree
          tree -a ${{ steps.deploy_path.outputs.path }} || true

      - name: Deploy to Main Org (delta/full as decided)
        if: steps.deploy_path.outputs.skip == &#39;false&#39;
        run: |
          # Using NoTestRun as requested
          sf project deploy start \
            --metadata-dir "${{ steps.deploy_path.outputs.path }}" \
            --target-org "$SF_ORG_ALIAS" \
            --test-level NoTestRun \
            --ignore-conflicts \
            --json

      - name: Post-deploy - Output result summary
        if: steps.deploy_path.outputs.skip == &#39;false&#39;
        run: |
          echo "Deployment attempted for path: ${{ steps.deploy_path.outputs.path }}"

      - name: Skip notice
        if: steps.deploy_path.outputs.skip == &#39;true&#39;
        run: echo "No changes detected for deployment; job completed without deploy."