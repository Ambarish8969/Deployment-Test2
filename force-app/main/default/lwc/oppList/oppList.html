<template>
    <lightning-button label="Get Opportunities" variant="brand" onclick={handleClick}></lightning-button>
    <template if:true={isClicked}>
        <lightning-datatable key-field="Id"
            data={data}
            columns={columns}
            hide-checkbox-column
            show-row-number-column
            draft-values={draftValues}
            onsave={handleSave}>
        </lightning-datatable>
    </template>
    <template if:false={isClicked}>
    </template>
    
</template>
